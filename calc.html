<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leverage & Compound Calculator - 67Labs</title>

    <!-- 🌸 67Labsデザインファビコン -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23ffb5b0%22/><text x=%2250%22 y=%2262%22 font-size=%2245%22 font-family=%22sans-serif%22 font-weight=%22800%22 fill=%22%23ffffff%22 text-anchor=%22middle%22>67</text></svg>">

    <style>
        :root {
            --bg-color: #faf6f0;        /* 極上のやわらかいアイボリー */
            --primary: #ffb5b0;         /* 上品なアプリコットピンク */
            --primary-hover: #ffa39d;
            --accent-mint: #d0f0c0;     /* 澄んだミントシャーベット */
            --accent-blue: #cbe3f8;     /* 涼しげなパステルブルー */
            --text-dark: #4a4543;       /* 温かみのある深焦げ茶 */
            --text-sub: #7d7571;        /* やさしいココアグレー */
            --white: #ffffff;
            --card-shadow: 0 10px 30px rgba(120, 90, 80, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* グローバルナビゲーション */
        .global-nav {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #ede5db;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 20px;
        }

        .nav-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--text-dark);
            text-decoration: none;
            letter-spacing: 0.1em;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-sub);
            font-size: 0.88rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--text-dark);
            background-color: rgba(0,0,0,0.04);
        }

        .nav-links a.active {
            background-color: var(--primary);
            color: var(--white);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ヘッダー */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-sub);
            background: var(--white);
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: var(--card-shadow);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        /* APIステータスインジケーター */
        .api-status {
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 15px;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50px;
            background-color: #ccc;
            display: inline-block;
        }
        .status-dot.online { background-color: #78bfa2; }
        .status-dot.offline { background-color: #ffa39d; }
        .status-dot.loading { background-color: #ffd166; animation: blink 1s infinite alternate; }

        @keyframes blink {
            from { opacity: 0.4; } to { opacity: 1; }
        }

        /* メインカード */
        .calc-card {
            background: var(--white);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(237, 229, 219, 0.3);
            margin-bottom: 30px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            border: 2px solid #f0eae1;
            border-radius: 14px;
            background-color: #fbfaf8;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 181, 176, 0.15);
        }

        /* ボタン */
        .btn-calc {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 181, 176, 0.3);
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 181, 176, 0.45);
        }

        /* テーブルエリア */
        .table-container {
            background: var(--white);
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(237, 229, 219, 0.3);
            overflow-x: auto;
            margin-top: 30px;
        }

        .table-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.05em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 0.88rem;
            min-width: 800px;
        }

        th {
            background-color: #fff4f2;
            color: var(--text-dark);
            font-weight: 700;
            padding: 12px 10px;
            border-bottom: 2px solid #ffe1dd;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #f6f0ea;
            color: var(--text-dark);
        }

        tr:hover {
            background-color: #fafaf9;
        }

        /* 合計行のスタイリング */
        .total-row {
            background-color: #fffbf0 !important;
            font-weight: 700;
            border-top: 2px solid #ffe1dd;
            border-bottom: 2px solid #ffe1dd;
        }

        .highlight-gain {
            color: #56b08a;
            font-weight: 700;
        }

        .highlight-loss {
            color: #f79a95;
            font-weight: 700;
        }

        /* 戻るリンク */
        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            font-size: 0.9rem;
            color: var(--text-sub);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--primary-hover);
        }

        /* フッター */
        footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .container { padding: 20px 10px; }
            .calc-card { padding: 25px 15px; }
            .table-container { padding: 15px 10px; }
            .nav-container { flex-direction: column; align-items: center; gap: 8px; }
        }
    </style>
</head>
<body>

    <!-- 共通ナビゲーション -->
    <nav class="global-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">67LABS</a>
            <ul class="nav-links">
                <li><a href="index.html">3Line BreakEven</a></li>
                <li><a href="analytics.html">Analytics Monitor</a></li>
                <li><a href="linear.html">Linear Regression</a></li>
                <li><a href="calc.html" class="active">計算ツール</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <!-- ヘッダー -->
        <header>
            <div class="logo-area">
                <span class="brand-logo">67Labs Tools</span>
            </div>
            <h1>Compound Calculator</h1>
            <p class="subtitle">実効レバレッジ維持型・複利計算シミュレーター</p>
        </header>

        <!-- API接続状態インジケーター -->
        <div class="api-status">
            <span id="statusDot" class="status-dot loading"></span>
            <span id="statusText">最新の為替・ゴールドレートを読み込み中...</span>
        </div>

        <!-- 計算カード -->
        <div class="calc-card">
            <div class="grid-inputs">
                <!-- 取引銘柄 -->
                <div class="input-group">
                    <label>取引銘柄</label>
                    <select id="currency" onchange="updateDefaultValues()">
                        <option value="GOLD">GOLD / XAUUSD (ゴールド)</option>
                        <option value="USDJPY">USD/JPY (ドル円)</option>
                        <option value="EURUSD">EUR/USD (ユーロドル)</option>
                        <option value="GBPUSD">GBP/USD (ポンドドル)</option>
                        <option value="EURJPY">EUR/JPY (ユーロ円)</option>
                        <option value="GBPJPY">GBPJPY (ポンド円)</option>
                    </select>
                </div>

                <!-- 当初資金 -->
                <div class="input-group">
                    <label>当初資金 (円)</label>
                    <input type="number" id="initBalance" value="10000">
                </div>

                <!-- 維持レバレッジ -->
                <div class="input-group">
                    <label>維持レバレッジ (倍)</label>
                    <input type="number" id="targetLev" value="100">
                </div>

                <!-- 許容リスク -->
                <div class="input-group">
                    <label>許容リスク (%)</label>
                    <input type="number" id="riskPct" value="5" step="0.1">
                </div>

                <!-- 1日の獲得pips -->
                <div class="input-group">
                    <label>1日の獲得pips</label>
                    <input type="number" id="targetPips" value="50">
                </div>

                <!-- 枚数上限 (ロット) -->
                <div class="input-group">
                    <label>枚数上限 (ロット)</label>
                    <input type="number" id="maxLots" value="100" step="0.1">
                </div>

                <!-- 通貨単位 -->
                <div class="input-group">
                    <label id="unitLabel">契約サイズ (1Lot=100oz)</label>
                    <input type="number" id="contractSize" value="100">
                </div>

                <!-- 銘柄の現在価格 -->
                <div class="input-group">
                    <label id="priceLabel">現在価格 (USD)</label>
                    <input type="number" id="currentPrice" value="2350.00" step="0.01">
                </div>

                <!-- ドル円現在レート -->
                <div class="input-group">
                    <label>ドル円現在レート (円)</label>
                    <input type="number" id="usdjpyRate" value="155.00" step="0.01">
                </div>
            </div>

            <button class="btn-calc" onclick="generateTable()">シミュレーション表を生成する</button>
        </div>

        <!-- 結果テーブル -->
        <div class="table-container">
            <div class="table-title" id="tableTitle">📈 1ヶ月（20日間）の複利運用計画</div>
            <table>
                <thead>
                    <tr>
                        <th>日数</th>
                        <th>枚数 (Lot)</th>
                        <th>1日の利益</th>
                        <th>運用資金</th>
                        <th>明日の損切り額</th>
                        <th>損切りpips</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    <!-- JSで動的に追加されます -->
                </tbody>
            </table>
        </div>

        <!-- 戻るリンク -->
        <div class="back-link">
            <a href="index.html">← Topに戻る</a>
        </div>

        <!-- フッター -->
        <footer>
            <p>&copy; 2026 67Labs. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // バックアップ用のデフォルトレート（通信エラー時の保険）
        const fallbackRates = {
            USDJPY: 155.00,
            EURUSD: 1.0850,
            GBPUSD: 1.2700,
            EURJPY: 168.17,
            GBPJPY: 196.85,
            GOLD:   2350.00
        };

        // 1pipの定義（GOLDはXM/Exness標準の0.1ドル）
        const PIP_VALUES = {
            GOLD: 0.1,
            USDJPY: 0.01,
            EURUSD: 0.0001,
            GBPUSD: 0.0001,
            EURJPY: 0.01,
            GBPJPY: 0.01
        };

        let liveRates = { ...fallbackRates };

        const defaults = {
            GOLD:   { unit: 100,    label: "現在価格 (USD)", unitLabel: "契約サイズ (1Lot=100oz)" },
            USDJPY: { unit: 100000, label: "現在価格 (円)",  unitLabel: "契約サイズ (1Lot=10万通貨)" },
            EURUSD: { unit: 100000, label: "現在価格 (USD)", unitLabel: "契約サイズ (1Lot=10万通貨)" },
            GBPUSD: { unit: 100000, label: "現在価格 (USD)", unitLabel: "契約サイズ (1Lot=10万通貨)" },
            EURJPY: { unit: 100000, label: "現在価格 (円)",  unitLabel: "契約サイズ (1Lot=10万通貨)" },
            GBPJPY: { unit: 100000, label: "現在価格 (円)",  unitLabel: "契約サイズ (1Lot=10万通貨)" }
        };

        // --- 🛡️ 堅牢・個別の自動レート取得処理 ---
        async function fetchLiveRates() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            // Promise.allSettled で為替とゴールドを独立して取得
            const results = await Promise.allSettled([
                fetchForexRates(),
                fetchGoldRate()
            ]);

            const forexSuccess = results[0].status === 'fulfilled';
            const goldSuccess = results[1].status === 'fulfilled';

            if (forexSuccess && goldSuccess) {
                statusDot.className = 'status-dot online';
                statusText.innerText = '● 為替・ゴールドレートを自動更新しました';
            } else if (forexSuccess || goldSuccess) {
                statusDot.className = 'status-dot online';
                statusText.innerText = '● 一部最新レートを更新しました（一部バックアップ使用）';
            } else {
                statusDot.className = 'status-dot offline';
                statusText.innerText = '⚠️ オフラインモード（基準バックアップレートを使用中）';
            }

            updateDefaultValues();
        }

        // ① 為替取得処理 (ER-API)
        async function fetchForexRates() {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            if (!res.ok) throw new Error('Forex API error');
            const data = await res.json();
            
            if (data && data.rates) {
                const rates = data.rates;
                if (rates.JPY) liveRates.USDJPY = rates.JPY;
                if (rates.EUR && rates.EUR > 0) liveRates.EURUSD = 1 / rates.EUR;
                if (rates.GBP && rates.GBP > 0) liveRates.GBPUSD = 1 / rates.GBP;
                if (rates.EUR && rates.JPY) liveRates.EURJPY = rates.JPY / rates.EUR;
                if (rates.GBP && rates.JPY) liveRates.GBPJPY = rates.JPY / rates.GBP;
            }
        }

        // ② ゴールド（XAUUSD）取得処理（優先: Fawazahmed0 API, バックアップ: Binance）
        async function fetchGoldRate() {
            try {
                const res = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/xau.json');
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.xau && data.xau.usd) {
                        liveRates.GOLD = data.xau.usd;
                        return;
                    }
                }
            } catch (e) {
                console.warn('ゴールド優先API接続失敗、バックアップAPIを試します');
            }

            // バックアップ: Binance PAXGUSDT
            const resBackup = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            if (!resBackup.ok) throw new Error('Gold Backup API error');
            const dataBackup = await resBackup.json();
            if (dataBackup.price) {
                liveRates.GOLD = parseFloat(dataBackup.price);
            }
        }

        function updateDefaultValues() {
            const currency = document.getElementById('currency').value;
            const data = defaults[currency];
            
            document.getElementById('currentPrice').value = liveRates[currency].toFixed(2);
            document.getElementById('usdjpyRate').value = liveRates.USDJPY.toFixed(2);

            document.getElementById('contractSize').value = data.unit;
            document.getElementById('priceLabel').innerText = data.label;
            document.getElementById('unitLabel').innerText = data.unitLabel;

            generateTable();
        }

        // ロット数の適切な四捨五入（0.019 -> 0.02 になる処理）
        function roundLot(rawLots, maxLots) {
            if (rawLots > maxLots) return maxLots;
            let rounded = Math.round(rawLots * 100) / 100;
            return Math.max(0.01, rounded);
        }

        function generateTable() {
            const currency = document.getElementById('currency').value;
            const initBalance = parseFloat(document.getElementById('initBalance').value) || 0;
            const targetLev = parseFloat(document.getElementById('targetLev').value) || 0;
            const riskPct = parseFloat(document.getElementById('riskPct').value) || 0;
            const targetPips = parseFloat(document.getElementById('targetPips').value) || 0;
            const maxLots = parseFloat(document.getElementById('maxLots').value) || 100;
            const contractSize = parseFloat(document.getElementById('contractSize').value) || 100000;
            const currentPrice = parseFloat(document.getElementById('currentPrice').value) || 0;
            const usdjpyRate = parseFloat(document.getElementById('usdjpyRate').value) || 0;

            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';

            document.getElementById('tableTitle').innerText = `📈 ${currency}：1ヶ月（20日間）の複利運用計画`;

            let currentBalance = initBalance;
            let totalProfit = 0;
            const pipValue = PIP_VALUES[currency] || 0.0001;

            for (let day = 1; day <= 20; day++) {
                let calculatedLots = 0;
                if (currentPrice > 0) {
                    if (currency === "GOLD" || currency === "EURUSD" || currency === "GBPUSD") {
                        calculatedLots = (currentBalance * targetLev) / (currentPrice * contractSize * usdjpyRate);
                    } else { // JPYペア
                        calculatedLots = (currentBalance * targetLev) / (currentPrice * contractSize);
                    }
                    calculatedLots = roundLot(calculatedLots, maxLots);
                }

                let dailyProfit = 0;
                if (currency === "GOLD" || currency === "EURUSD" || currency === "GBPUSD") {
                    dailyProfit = calculatedLots * contractSize * (targetPips * pipValue) * usdjpyRate;
                } else { // JPYペア
                    dailyProfit = calculatedLots * contractSize * (targetPips * pipValue);
                }

                totalProfit += dailyProfit;
                const nextBalance = currentBalance + dailyProfit;
                const stopLossAmount = nextBalance * (riskPct / 100);

                let nextDayLots = 0;
                if (currency === "GOLD" || currency === "EURUSD" || currency === "GBPUSD") {
                    nextDayLots = (nextBalance * targetLev) / (currentPrice * contractSize * usdjpyRate);
                } else {
                    nextDayLots = (nextBalance * targetLev) / (currentPrice * contractSize);
                }
                nextDayLots = roundLot(nextDayLots, maxLots);

                let stopLossPips = 0;
                if (nextDayLots > 0) {
                    if (currency === "GOLD" || currency === "EURUSD" || currency === "GBPUSD") {
                        stopLossPips = stopLossAmount / (nextDayLots * contractSize * pipValue * usdjpyRate);
                    } else {
                        stopLossPips = stopLossAmount / (nextDayLots * contractSize * pipValue);
                    }
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><b>${day}日目</b></td>
                    <td>${calculatedLots.toFixed(2)}</td>
                    <td class="highlight-gain">¥${Math.round(dailyProfit).toLocaleString()}</td>
                    <td><b>¥${Math.round(nextBalance).toLocaleString()}</b></td>
                    <td class="highlight-loss">¥${Math.round(stopLossAmount).toLocaleString()}</td>
                    <td>${stopLossPips.toFixed(1)}</td>
                `;
                tbody.appendChild(row);

                currentBalance = nextBalance;
            }

            // 最下部の合計行
            const totalRow = document.createElement('tr');
            totalRow.className = 'total-row';
            totalRow.innerHTML = `
                <td><b>合計 / 最終結果</b></td>
                <td>-</td>
                <td class="highlight-gain">¥${Math.round(totalProfit).toLocaleString()}</td>
                <td><b>¥${Math.round(currentBalance).toLocaleString()}</b></td>
                <td>-</td>
                <td>-</td>
            `;
            tbody.appendChild(totalRow);
        }

        window.onload = fetchLiveRates;
    </script>
</body>
</html>
