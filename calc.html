<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leverage & Compound Calculator - 67Labs</title>
    <style>
        :root {
            --bg-color: #faf6f0;        /* 極上のやわらかいアイボリー */
            --primary: #ffb5b0;         /* 上品なアプリコットピンク */
            --primary-hover: #ffa39d;
            --accent-mint: #d0f0c0;     /* 澄んだミントシャーベット */
            --accent-blue: #cbe3f8;     /* 涼しげなパステルブルー */
            --text-dark: #4a4543;       /* 温かみのある深焦げ茶 */
            --text-sub: #7d7571;        /* やさしいココアグレー */
            --white: #ffffff;
            --card-shadow: 0 10px 30px rgba(120, 90, 80, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ヘッダー */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-sub);
            background: var(--white);
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: var(--card-shadow);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        /* メインカード */
        .calc-card {
            background: var(--white);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(237, 229, 219, 0.3);
            margin-bottom: 30px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            border: 2px solid #f0eae1;
            border-radius: 14px;
            background-color: #fbfaf8;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 181, 176, 0.15);
        }

        /* ボタン */
        .btn-calc {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 181, 176, 0.3);
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 181, 176, 0.45);
        }

        /* テーブルエリア */
        .table-container {
            background: var(--white);
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(237, 229, 219, 0.3);
            overflow-x: auto;
            margin-top: 30px;
        }

        .table-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.05em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 0.88rem;
            min-width: 800px;
        }

        th {
            background-color: #fff4f2;
            color: var(--text-dark);
            font-weight: 700;
            padding: 12px 10px;
            border-bottom: 2px solid #ffe1dd;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #f6f0ea;
            color: var(--text-dark);
        }

        tr:hover {
            background-color: #fafaf9;
        }

        .highlight-gain {
            color: #56b08a;
            font-weight: 700;
        }

        .highlight-loss {
            color: #f79a95;
            font-weight: 700;
        }

        /* 戻るリンク */
        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            font-size: 0.9rem;
            color: var(--text-sub);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--primary-hover);
        }

        /* フッター */
        footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            .calc-card { padding: 25px 15px; }
            .table-container { padding: 15px 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ヘッダー -->
        <header>
            <div class="logo-area">
                <span class="brand-logo">67Labs Tools</span>
            </div>
            <h1>Gold Compound Calculator</h1>
            <p class="subtitle">ゴールド（XAU/USD）実効レバレッジ維持型・複利計算ツール</p>
        </header>

        <!-- 計算カード -->
        <div class="calc-card">
            <div class="grid-inputs">
                <!-- 当初資金 -->
                <div class="input-group">
                    <label>当初資金 (円)</label>
                    <input type="number" id="initBalance" value="10000">
                </div>

                <!-- 維持レバレッジ -->
                <div class="input-group">
                    <label>維持レバレッジ (倍)</label>
                    <input type="number" id="targetLev" value="200">
                </div>

                <!-- 許容リスク -->
                <div class="input-group">
                    <label>許容リスク (%)</label>
                    <input type="number" id="riskPct" value="2" step="0.1">
                </div>

                <!-- 1日の獲得pips -->
                <div class="input-group">
                    <label>1日の獲得pips</label>
                    <input type="number" id="targetPips" value="20">
                </div>

                <!-- 枚数上限 (ロット) -->
                <div class="input-group">
                    <label>枚数上限 (ロット)</label>
                    <input type="number" id="maxLots" value="1000" step="0.1">
                </div>

                <!-- 通貨単位 -->
                <div class="input-group">
                    <label>通貨単位 (0.01t=100)</label>
                    <input type="number" id="contractSize" value="100">
                </div>

                <!-- ゴールド現在価格 -->
                <div class="input-group">
                    <label>ゴールド現在価格 (USD)</label>
                    <input type="number" id="goldPrice" value="4060.00" step="0.01">
                </div>

                <!-- ドル円現在レート -->
                <div class="input-group">
                    <label>ドル円現在レート (円)</label>
                    <input type="number" id="usdjpyRate" value="162.00" step="0.01">
                </div>
            </div>

            <button class="btn-calc" onclick="generateTable()">シミュレーション表を生成する</button>
        </div>

        <!-- 結果テーブル -->
        <div class="table-container">
            <div class="table-title">📈 15日間の複利運用計画</div>
            <table>
                <thead>
                    <tr>
                        <th>日数</th>
                        <th>枚数 (Lot)</th>
                        <th>1日の利益</th>
                        <th>運用資金</th>
                        <th>明日の損切り額</th>
                        <th>損切りpips</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    <!-- JSで動的に追加されます -->
                </tbody>
            </table>
        </div>

        <!-- 戻るリンク -->
        <div class="back-link">
            <a href="index.html">← 3Line BreakEven の製品紹介に戻る</a>
        </div>

        <!-- フッター -->
        <footer>
            <p>&copy; 2026 67Labs. All rights reserved.</p>
        </footer>
    </div>

    <script>
        function generateTable() {
            // パラメータ取得
            const initBalance = parseFloat(document.getElementById('initBalance').value) || 0;
            const targetLev = parseFloat(document.getElementById('targetLev').value) || 0;
            const riskPct = parseFloat(document.getElementById('riskPct').value) || 0;
            const targetPips = parseFloat(document.getElementById('targetPips').value) || 0;
            const maxLots = parseFloat(document.getElementById('maxLots').value) || 0;
            const contractSize = parseFloat(document.getElementById('contractSize').value) || 100;
            const goldPrice = parseFloat(document.getElementById('goldPrice').value) || 0;
            const usdjpyRate = parseFloat(document.getElementById('usdjpyRate').value) || 0;

            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = ''; // クリア

            let currentBalance = initBalance;

            for (let day = 1; day <= 15; day++) {
                // 1. 枚数（ロット数）の計算
                // 計算式：(運用資金 * 維持レバレッジ) / (ゴールド価格 * 通貨単位 * ドル円)
                let calculatedLots = 0;
                if (goldPrice > 0 && usdjpyRate > 0) {
                    calculatedLots = (currentBalance * targetLev) / (goldPrice * contractSize * usdjpyRate);
                    // 枚数上限（ロット上限）を適用
                    if (calculatedLots > maxLots) {
                        calculatedLots = maxLots;
                    }
                    // MT5用に小数第2位（0.01刻み）で切り捨て処理
                    calculatedLots = Math.floor(calculatedLots * 100) / 100;
                    if (calculatedLots < 0.01) calculatedLots = 0.01; // 最低ロット
                }

                // 2. 1日の利益（円）の計算
                // 計算式：ロット数 * 通貨単位 * (獲得pips * 0.1) * ドル円
                // （※ゴールドは0.1ドル＝1pip想定）
                const dailyProfit = calculatedLots * contractSize * (targetPips * 0.1) * usdjpyRate;

                // 3. 翌日の運用資金
                const nextBalance = currentBalance + dailyProfit;

                // 4. 明日の損切り額
                // 計算式：運用資金（利益獲得後） * 許容リスク%
                const stopLossAmount = nextBalance * (riskPct / 100);

                // 5. 損切りpips
                // 計算式：明日の損切り額 / (明日の枚数 * 通貨単位 * 0.1 * ドル円)
                // ※ここでは「明日の枚数」を、翌日の資金ベースで再計算したロット数に設定します
                let nextDayLots = (nextBalance * targetLev) / (goldPrice * contractSize * usdjpyRate);
                if (nextDayLots > maxLots) nextDayLots = maxLots;
                nextDayLots = Math.floor(nextDayLots * 100) / 100;
                if (nextDayLots < 0.01) nextDayLots = 0.01;

                let stopLossPips = 0;
                if (nextDayLots > 0) {
                    stopLossPips = stopLossAmount / (nextDayLots * contractSize * 0.1 * usdjpyRate);
                }

                // 表に1行追加
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><b>${day}日目</b></td>
                    <td>${calculatedLots.toFixed(2)}</td>
                    <td class="highlight-gain">¥${Math.round(dailyProfit).toLocaleString()}</td>
                    <td><b>¥${Math.round(nextBalance).toLocaleString()}</b></td>
                    <td class="highlight-loss">¥${Math.round(stopLossAmount).toLocaleString()}</td>
                    <td>${stopLossPips.toFixed(1)}</td>
                `;
                tbody.appendChild(row);

                // 翌日の計算用資金を更新
                currentBalance = nextBalance;
            }
        }

        // 初期表示で一度計算を実行
        window.onload = generateTable;
    </script>
</body>
</html>
