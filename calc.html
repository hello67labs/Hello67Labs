<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leverage & PL Calculator - 67Labs</title>
    <style>
        :root {
            --bg-color: #faf6f0;        /* 極上のやわらかいアイボリー */
            --primary: #ffb5b0;         /* 上品なアプリコットピンク */
            --primary-hover: #ffa39d;
            --accent-mint: #d0f0c0;     /* 澄んだミントシャーベット */
            --accent-blue: #cbe3f8;     /* 涼しげなパステルブルー */
            --text-dark: #4a4543;       /* 温かみのある深焦げ茶 */
            --text-sub: #7d7571;        /* やさしいココアグレー */
            --white: #ffffff;
            --card-shadow: 0 10px 30px rgba(120, 90, 80, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* ヘッダー */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-sub);
            background: var(--white);
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: var(--card-shadow);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        /* メインカード */
        .calc-card {
            background: var(--white);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(237, 229, 219, 0.3);
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #f0eae1;
            border-radius: 16px;
            background-color: #fbfaf8;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 181, 176, 0.15);
        }

        /* 結果エリア */
        .result-section {
            background-color: #fff9f8;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #ffebe9;
            margin-top: 30px;
        }

        .result-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text-sub);
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 0.05em;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .result-box {
            background: var(--white);
            padding: 15px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.01);
            border: 1px solid rgba(237, 229, 219, 0.5);
        }

        .result-label {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .result-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        /* 戻るリンク */
        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            font-size: 0.9rem;
            color: var(--text-sub);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--primary-hover);
        }

        /* フッター */
        footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 60px;
        }

        @media (max-width: 480px) {
            body { padding: 20px 10px; }
            .calc-card { padding: 30px 20px; }
            .result-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ヘッダー -->
        <header>
            <div class="logo-area">
                <span class="brand-logo">67Labs Tools</span>
            </div>
            <h1>Leverage & PL Calculator</h1>
            <p class="subtitle">レバレッジと損益をシンプルに同時計算</p>
        </header>

        <!-- 計算カード -->
        <div class="calc-card">
            <!-- 通貨ペア選択 -->
            <div class="input-group">
                <label for="currency">取引銘柄</label>
                <select id="currency" onchange="calculate()">
                    <option value="USDJPY">USD/JPY (ドル円)</option>
                    <option value="EURUSD">EUR/USD (ユーロドル)</option>
                    <option value="GBPUSD">GBP/USD (ポンドドル)</option>
                    <option value="EURJPY">EUR/JPY (ユーロ円)</option>
                    <option value="GBPJPY">GBPJPY (ポンド円)</option>
                    <option value="GOLD">GOLD / XAUUSD (ゴールド)</option>
                </select>
            </div>

            <!-- 口座残高 -->
            <div class="input-group">
                <label for="balance">口座資金 (円)</label>
                <input type="number" id="balance" value="100000" oninput="calculate()">
            </div>

            <!-- ロット数 -->
            <div class="input-group">
                <label for="lots">取引数量 (ロット)</label>
                <input type="number" id="lots" value="0.1" step="0.01" oninput="calculate()">
            </div>

            <!-- 獲得・損失ピップス -->
            <div class="input-group">
                <label for="pips">想定値幅 (pips)</label>
                <input type="number" id="pips" value="20" oninput="calculate()">
            </div>

            <!-- 結果 -->
            <div class="result-section">
                <div class="result-title">CALCULATION RESULT</div>
                <div class="result-grid">
                    <div class="result-box">
                        <div class="result-label">実効レバレッジ</div>
                        <div class="result-value" id="res-leverage">0.0 倍</div>
                    </div>
                    <div class="result-box">
                        <div class="result-label">想定損益</div>
                        <div class="result-value" id="res-profit" style="color: #ff9e97;">±0 円</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- インジ紹介ページへの導線 -->
        <div class="back-link">
            <a href="index.html">← 3Line BreakEven の製品紹介に戻る</a>
        </div>

        <!-- フッター -->
        <footer>
            <p>&copy; 2026 67Labs. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // 計算用の為替レート（リアルタイムに近い平均値）
        const rates = {
            USDJPY: 150.0,   // 1ドル = 150円
            EURUSD: 1.08,    // 1ユーロ = 1.08ドル
            GBPUSD: 1.28,    // 1ポンド = 1.28ドル
            EURJPY: 162.0,   // 1ユーロ = 162円
            GBPJPY: 192.0,   // 1ポンド = 192円
            GOLD: 2400.0     // ゴールド1オンス = 2400ドル
        };

        function calculate() {
            const currency = document.getElementById('currency').value;
            const balance = parseFloat(document.getElementById('balance').value) || 0;
            const lots = parseFloat(document.getElementById('lots').value) || 0;
            const pips = parseFloat(document.getElementById('pips').value) || 0;

            const usdjpyRate = rates["USDJPY"];
            let leverage = 0;
            let profit = 0;

            if (balance > 0 && lots > 0) {
                if (currency === "GOLD") {
                    // --- ゴールドの計算 ---
                    // ゴールドは1ロット＝100オンス
                    const contractSize = 100; 
                    const totalValueUSD = lots * contractSize * rates["GOLD"];
                    const totalValueJPY = totalValueUSD * usdjpyRate;
                    
                    leverage = totalValueJPY / balance;
                    // ゴールドの1pip＝0.1ドル幅
                    profit = lots * contractSize * (pips * 0.1) * usdjpyRate;

                } else {
                    // --- 通常のFX通貨ペアの計算 ---
                    const contractSize = 100000; // 1ロット = 10万通貨
                    const rate = rates[currency];

                    if (currency.endsWith("JPY")) {
                        // クロス円 (USDJPY, EURJPY, GBPJPY)
                        const totalValue = lots * contractSize * rate;
                        leverage = totalValue / balance;
                        profit = lots * contractSize * (pips * 0.01);
                    } else {
                        // ドルストレート (EURUSD, GBPUSD)
                        const totalValue = lots * contractSize * rate * usdjpyRate;
                        leverage = totalValue / balance;
                        // 1pips = 0.0001 USD
                        profit = lots * contractSize * (pips * 0.0001) * usdjpyRate;
                    }
                }
            }

            // 結果の反映
            document.getElementById('res-leverage').innerText = leverage.toFixed(1) + ' 倍';
            
            // 損益表示の装飾
            const formattedProfit = Math.round(profit).toLocaleString();
            const profitEl = document.getElementById('res-profit');
            if (pips > 0) {
                profitEl.innerText = '+' + formattedProfit + ' 円';
                profitEl.style.color = '#78bfa2'; // 上品なグリーン
            } else if (pips < 0) {
                profitEl.innerText = formattedProfit + ' 円';
                profitEl.style.color = '#ffa39d'; // アプリコットピンク
            } else {
                profitEl.innerText = '±0 円';
                profitEl.style.color = 'var(--text-dark)';
            }
        }

        // 起動時に計算
        window.onload = calculate;
    </script>
</body>
</html>
